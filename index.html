<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foodie Delivery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Navbar -->
<header>
    <h1>Foodie</h1>
    <nav>
        <a href="#">Home</a>
        <a href="#menu">Menu</a>
        <a href="#contact">Contact</a>
        <a href="#" id="cartBtn">Cart (0)</a>
        <a href="#" id="loginBtn">Login</a>
    </nav>
</header>

<!-- Hero Section -->
<section class="hero">
    <div class="hero-text">
        <h2>Delicious Food Delivered To You</h2>
        <p>Fast • Fresh • Tasty</p>
        <button>Order Now</button>
    </div>
</section>

<!-- Menu Section -->
<section id="menu" class="menu">
    <h2>Our Menu</h2>
    <div class="food-container">

        <div class="food-card">
            <img src="https://images.unsplash.com/photo-1550547660-d9450f859349" alt="Burger">
            <h3>Burger</h3>
            <p>₹149</p>
            <button onclick="addToCart()">Add to Cart</button>
        </div>

        <div class="food-card">
            <img src="https://images.unsplash.com/photo-1525755662778-989d0524087e" alt="Pasta">
            <h3>Pasta</h3>
            <p>₹199</p>
            <button onclick="addToCart()">Add to Cart</button>
        </div>
    </div>
</section>

<!-- Contact -->
<footer id="contact">
    <p>© 2025 Foodie | Contact: foodie@email.com</p>
</footer>

<!-- Login/Signup Modal -->
<div id="authModal" class="modal">
    <div class="modal-content">
        <span class="close">&times;</span>
        <div class="tab">
            <button class="tablinks" onclick="openTab(event, 'Login')" id="defaultOpen">Login</button>
            <button class="tablinks" onclick="openTab(event, 'Signup')">Sign Up</button>
        </div>

        <!-- Login Form -->
        <div id="Login" class="tabcontent">
            <h3>Login</h3>
            <input type="text" placeholder="Email" id="loginEmail">
            <input type="password" placeholder="Password" id="loginPassword">
            <button onclick="loginUser()">Login</button>
        </div>

        <!-- Signup Form -->
        <div id="Signup" class="tabcontent">
            <h3>Sign Up</h3>
            <input type="text" placeholder="Name" id="signupName">
            <input type="text" placeholder="Email" id="signupEmail">
            <input type="password" placeholder="Password" id="signupPassword">
            <button onclick="signupUser()">Sign Up</button>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
